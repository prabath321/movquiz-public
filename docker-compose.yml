services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: movquiz_app
    network_mode: service:mysql
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./.env:/var/www/html/.env:ro
      - app_storage:/var/www/html/storage

  mysql:
    image: mysql:8.0
    container_name: movquiz_mysql
    ports:
      - "8001:8000"
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-movquiz}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  app_storage:
  mysql_data:
